name: Android R0 CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-lint-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve sdkmanager path
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            exit 1
          fi
          echo "SDKMANAGER=$SDKMANAGER" >> "$GITHUB_ENV"

      - name: Print Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          "$SDKMANAGER" --list | head -n 50

      - name: Accept licenses
        run: yes | "$SDKMANAGER" --licenses

      - name: Install SDK packages
        run: |
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64" \
            "system-images;android-34;google_apis;x86_64"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Assemble release
        run: ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Unit tests
        run: |
          bash -lc "set -o pipefail; ./gradlew --no-daemon --stacktrace --info test 2>&1 | tee unit-test.log; exit \${PIPESTATUS[0]}"

      - name: Lint
        run: ./gradlew lint --no-daemon --stacktrace --info

      - name: Upload build, lint and unit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-build-lint-unit
          path: |
            unit-test.log
            hrv_ib/**/build/reports/**
            hrv_ib/**/build/test-results/**
            hrv_ib/**/build/outputs/androidTest-results/**
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
            **/build/reports/**
            **/build/test-results/**

      - name: Summarize build-lint-unit failure
        if: always()
        shell: bash
        run: |
          if [ ! -f unit-test.log ]; then
            echo "::error title=Unit test log missing::unit-test.log was not generated"
            exit 0
          fi
          FIRST_FAILED_TASK="$(grep -m1 -o "Execution failed for task '[^']*'" unit-test.log || true)"
          if [ -z "$FIRST_FAILED_TASK" ]; then
            FIRST_FAILED_TASK="$(grep -m1 -o "Task :[^ ]* FAILED" unit-test.log || true)"
          fi
          if [ -z "$FIRST_FAILED_TASK" ]; then
            FIRST_FAILED_TASK="not found"
          fi
          echo "::error title=First failed Gradle task::$FIRST_FAILED_TASK"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=Kotlin compile detail::$line"
          done < <(grep -m8 -E "^e: | error: " unit-test.log || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=Unit test failure detail::$line"
          done < <(grep -m8 -E "> Task :.*test.* FAILED|There were failing tests|FAILURES!!!|AssertionError|expected:|but was:" unit-test.log || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=Unit test XML failure detail::$line"
          done < <(grep -R -m8 -n "<failure" app/build/test-results 2>/dev/null || true)

  connected-android-test:
    runs-on: ubuntu-latest
    needs: build-lint-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve sdkmanager path
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            exit 1
          fi
          echo "SDKMANAGER=$SDKMANAGER" >> "$GITHUB_ENV"

      - name: Print Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          "$SDKMANAGER" --list | head -n 50

      - name: Accept licenses
        run: yes | "$SDKMANAGER" --licenses

      - name: Install SDK packages
        run: |
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Connected tests on emulator (API 34)
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-boot-timeout: 1200
          script: |
            bash -lc "set -o pipefail; : > connected-android-test.log; adb wait-for-device 2>&1 | tee -a connected-android-test.log || true; adb shell settings put global window_animation_scale 0 2>&1 | tee -a connected-android-test.log || true; adb shell settings put global transition_animation_scale 0 2>&1 | tee -a connected-android-test.log || true; adb shell settings put global animator_duration_scale 0 2>&1 | tee -a connected-android-test.log || true; adb devices 2>&1 | tee -a connected-android-test.log || true; adb shell getprop ro.build.version.release 2>&1 | tee -a connected-android-test.log || true; adb shell getprop ro.build.version.sdk 2>&1 | tee -a connected-android-test.log || true; ./gradlew --no-daemon --stacktrace --info connectedDebugAndroidTest 2>&1 | tee -a connected-android-test.log; GRADLE_EXIT=\${PIPESTATUS[0]}; adb logcat -d | tail -n 300 2>&1 | tee -a connected-android-test.log || true; exit \$GRADLE_EXIT"

      - name: Upload connected-android-test log
        if: always()
        run: |
          if [ ! -f connected-android-test.log ]; then
            echo "connected-android-test.log was not produced by connected job." > connected-android-test.log
          fi
          ls -la

      - name: Upload connected-android-test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-android-test-log
          path: connected-android-test.log

      - name: Summarize connected failure
        if: always()
        shell: bash
        run: |
          if [ ! -f connected-android-test.log ]; then
            echo "::error title=Connected log missing::connected-android-test.log was not generated"
            exit 0
          fi
          FIRST_FAILED_TASK="$(grep -m1 -o "Execution failed for task '[^']*'" connected-android-test.log || true)"
          if [ -z "$FIRST_FAILED_TASK" ]; then
            FIRST_FAILED_TASK="$(grep -m1 -o "Task :[^ ]* FAILED" connected-android-test.log || true)"
          fi
          if [ -z "$FIRST_FAILED_TASK" ]; then
            FIRST_FAILED_TASK="not found"
          fi
          echo "::error title=First failed Gradle task::$FIRST_FAILED_TASK"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=Kotlin compile detail::$line"
          done < <(grep -m5 -E "^e: | error: " connected-android-test.log || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=Connected test failure detail::$line"
          done < <(grep -m5 -E " > .* FAILED|There were failing tests|FAILURES!!!|java.lang.AssertionError|junit.framework.AssertionFailedError" connected-android-test.log || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error title=AndroidTest XML failure detail::$line"
          done < <(grep -R -m5 -n "<failure" app/build/outputs/androidTest-results 2>/dev/null || true)
          echo "Last 30 log lines:"
          tail -n 30 connected-android-test.log

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-androidTest
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
