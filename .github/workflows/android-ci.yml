name: Android R0 CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-lint-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hrv_ib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64" \
            "system-images;android-34;google_apis;x86_64"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Assemble
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Upload build, lint and unit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-build-lint-unit
          path: |
            hrv_ib/**/build/outputs/apk/release/*.apk
            hrv_ib/**/build/reports/**
            hrv_ib/**/build/test-results/**

  connected-android-test:
    runs-on: ubuntu-latest
    needs: build-lint-unit
    defaults:
      run:
        working-directory: hrv_ib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Connected tests on emulator (fallback API 34)
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 1200
          script: cd hrv_ib && ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-androidTest
          path: |
            hrv_ib/**/build/reports/**
            hrv_ib/**/build/test-results/**
            hrv_ib/**/build/outputs/androidTest-results/**
